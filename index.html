<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FuelLog">
<meta name="theme-color" content="#09090b">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>FuelLog</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #09090b;
  --card: #111114;
  --border: #1c1c22;
  --text: #ededf0;
  --text-secondary: #a0a0b0;
  --text-muted: #55556a;
  --accent: #0ea5e9;
  --accent-soft: rgba(14,165,233,0.1);
  --accent-glow: rgba(14,165,233,0.25);
  --btn-inactive: #18181e;
  --input-bg: #0d0d10;
  --bar-bg: #18181e;
  --green: #34d399;
  --yellow: #fbbf24;
  --red: #f87171;
  --radius: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100dvh;
  padding: env(safe-area-inset-top) 0 0 0;
  overflow-x: hidden;
}
.mono { font-family: 'DM Mono', monospace; }
.app { max-width: 460px; margin: 0 auto; padding: 12px 16px 120px; }
.header { text-align: center; padding: 18px 0 16px; }
.header h1 { font-size: 26px; font-weight: 800; letter-spacing: 3px; background: linear-gradient(135deg, var(--accent), #67e8f9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header p { font-size: 10px; color: var(--text-muted); letter-spacing: 3px; margin-top: 2px; }

/* day type toggle */
.day-toggle { display: flex; background: var(--card); border-radius: 10px; padding: 3px; margin-bottom: 16px; border: 1px solid var(--border); }
.day-toggle button { flex: 1; padding: 9px 0; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; font-family: 'DM Mono', monospace; transition: all 0.25s; }
.day-toggle button.active { background: var(--accent); color: #fff; box-shadow: 0 0 12px var(--accent-glow); }
.day-toggle button.inactive { background: transparent; color: var(--text-muted); }

.card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; border: 1px solid var(--border); }
.card-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 10px; }
.bar-wrap { margin-bottom: 10px; }
.bar-header { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; color: var(--text-secondary); }
.bar-track { height: 7px; background: var(--bar-bg); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
input, select {
  width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--input-bg); color: var(--text); font-size: 13px;
  font-family: 'DM Mono', monospace;
}
input:focus, select:focus { outline: 1px solid var(--accent); border-color: var(--accent); }
input::placeholder { color: var(--text-muted); }
select { appearance: none; }
.btn {
  padding: 10px 16px; border-radius: 10px; border: none; font-size: 13px;
  font-weight: 600; cursor: pointer; font-family: 'DM Mono', monospace;
  transition: opacity 0.2s, transform 0.1s;
}
.btn:active { opacity: 0.7; transform: scale(0.97); }
.btn-primary { background: var(--accent); color: #fff; width: 100%; }
.btn-toggle {
  padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border);
  background: transparent; color: var(--text-secondary); font-size: 12px;
  font-family: 'DM Mono', monospace; cursor: pointer; transition: all 0.2s;
}
.btn-toggle.active { background: var(--accent-soft); color: var(--accent); border-color: rgba(14,165,233,0.3); }
.btn-mode { flex: 1; padding: 8px 0; border-radius: 8px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; font-family: 'DM Mono', monospace; transition: all 0.2s; }
.btn-mode.active { background: var(--accent); color: #fff; }
.btn-mode.inactive { background: var(--btn-inactive); color: var(--text-secondary); }
.flex { display: flex; }
.gap-8 { gap: 8px; }
.wrap { flex-wrap: wrap; }
.mb-8 { margin-bottom: 8px; }
.mb-12 { margin-bottom: 12px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.log-item { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); }
.log-item:last-child { border-bottom: none; }
.log-name { font-size: 13px; font-weight: 500; }
.log-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.icon-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; padding: 4px 6px; transition: color 0.2s; }
.icon-btn:hover { color: var(--text-secondary); }
.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(9,9,11,0.92); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  display: flex; justify-content: center;
  padding: 8px 0 34px;
  padding-bottom: calc(34px + env(safe-area-inset-bottom));
  z-index: 100;
}
.tab-btn {
  flex: 1; max-width: 100px; display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none; cursor: pointer; padding: 6px 0;
  color: var(--text-muted); transition: color 0.2s;
}
.tab-btn.active { color: var(--accent); }
.tab-icon { font-size: 18px; }
.tab-label { font-size: 10px; font-weight: 400; letter-spacing: 0.5px; }
.tab-btn.active .tab-label { font-weight: 700; }
.empty { text-align: center; color: var(--text-muted); padding: 40px 20px; font-size: 13px; }
.date-nav { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 14px; }
.date-nav button { background: none; border: none; color: var(--accent); font-size: 20px; cursor: pointer; padding: 4px 8px; }
.date-nav span { font-size: 14px; font-weight: 600; min-width: 120px; text-align: center; }
.hidden { display: none; }

/* edit modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200;
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.modal {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px; width: 100%; max-width: 380px;
}
.modal h3 { font-size: 15px; margin-bottom: 14px; font-weight: 600; }
.modal .btn-row { display: flex; gap: 8px; margin-top: 14px; }
.modal .btn-row .btn { flex: 1; }
.btn-secondary { background: var(--btn-inactive); color: var(--text-secondary); }
.btn-danger { background: rgba(248,113,113,0.15); color: var(--red); }

/* food manager */
.food-manage-btn { font-size: 11px; color: var(--accent); background: none; border: none; cursor: pointer; font-family: 'DM Mono', monospace; padding: 2px 0; }
.food-list-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.food-list-item:last-child { border-bottom: none; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>FUELLOG</h1>
    <p class="mono">TRACK &middot; EAT &middot; BUILD</p>
  </div>

  <div id="tab-meals">
    <div id="date-nav-meals" class="date-nav">
      <button onclick="changeDate(-1)">&larr;</button>
      <span id="current-date" class="mono"></span>
      <button onclick="changeDate(1)">&rarr;</button>
    </div>

    <div class="day-toggle">
      <button id="dt-training" class="active" onclick="setDayType('training')">Training Day</button>
      <button id="dt-rest" class="inactive" onclick="setDayType('rest')">Rest Day</button>
    </div>

    <div class="card">
      <div class="card-label mono">Macros</div>
      <div id="macro-bars"></div>
    </div>

    <div class="card">
      <div class="flex gap-8 mb-12">
        <button class="btn-mode active" id="mode-preset" onclick="setMode('preset')">My Foods</button>
        <button class="btn-mode inactive" id="mode-custom" onclick="setMode('custom')">Custom</button>
      </div>

      <div class="flex gap-8 wrap mb-12" id="meal-labels"></div>

      <div id="input-preset">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span></span>
          <button class="food-manage-btn" onclick="openFoodManager()">Edit Foods</button>
        </div>
        <select id="food-select" class="mb-8"></select>
        <div class="flex gap-8">
          <div style="width:70px">
            <input type="number" id="food-qty" value="1" min="0.5" step="0.5" placeholder="Qty">
          </div>
          <button class="btn btn-primary" style="flex:1" onclick="addMeal()">+ Add</button>
        </div>
      </div>

      <div id="input-custom" class="hidden">
        <input id="c-name" placeholder="Food name" class="mb-8">
        <div class="grid-2 mb-8">
          <input id="c-cal" type="number" placeholder="Calories">
          <input id="c-protein" type="number" placeholder="Protein (g)">
          <input id="c-fat" type="number" placeholder="Fat (g)">
          <input id="c-carbs" type="number" placeholder="Carbs (g)">
        </div>
        <button class="btn btn-primary" onclick="addMeal()">+ Add Custom</button>
      </div>
    </div>

    <div class="card" id="meal-log-card" style="display:none">
      <div class="card-label mono">Today's Log</div>
      <div id="meal-log"></div>
    </div>
  </div>

  <div id="tab-weight" class="hidden">
    <div class="card">
      <div class="flex gap-8">
        <input id="bw-input" type="number" placeholder="Today's weight (kg)" step="0.1" style="flex:1">
        <button class="btn" style="background:var(--accent);color:#fff;width:auto" onclick="addWeight()">Log</button>
      </div>
    </div>
    <div class="card" id="weight-chart-card" style="display:none">
      <div class="card-label mono">Trend</div>
      <svg id="weight-chart" viewBox="0 0 400 120" style="width:100%;height:120px"></svg>
    </div>
    <div class="card" id="weight-list-card" style="display:none">
      <div class="card-label mono">Recent</div>
      <div id="weight-list"></div>
    </div>
  </div>

  <div id="tab-history" class="hidden">
    <div id="history-list"></div>
  </div>
</div>

<!-- modal container -->
<div id="modal-root"></div>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="meals" onclick="switchTab('meals')">
    <span class="tab-icon">🍽</span><span class="tab-label mono">Meals</span>
  </button>
  <button class="tab-btn" data-tab="weight" onclick="switchTab('weight')">
    <span class="tab-icon">⚖️</span><span class="tab-label mono">Weight</span>
  </button>
  <button class="tab-btn" data-tab="history" onclick="switchTab('history')">
    <span class="tab-icon">📊</span><span class="tab-label mono">History</span>
  </button>
</div>

<script>
// # INDEXEDDB
const DB_NAME = 'recomp-tracker';
const DB_VERSION = 2;
const STORES = ['meals', 'weights', 'settings', 'customFoods'];

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      STORES.forEach(s => { if (!db.objectStoreNames.contains(s)) db.createObjectStore(s, { keyPath: 'id' }); });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbGetAll(store) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbPut(store, item) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).put(item);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function dbDelete(store, id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

// # DATE UTILS
function getToday() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function localDateStr(date) {
  return date.getFullYear() + '-' + String(date.getMonth()+1).padStart(2,'0') + '-' + String(date.getDate()).padStart(2,'0');
}

// # STATE
let meals = [];
let weights = [];
let customFoods = [];
let currentTab = 'meals';
let inputMode = 'preset';
let mealLabel = 'Breakfast';
let viewDate = getToday();
let dayType = 'training';

// # TARGETS
const TARGETS = {
  training: { calories: [2300, 2400], protein: [175, 185], fat: [60, 70], carbs: [200, 220] },
  rest:     { calories: [2000, 2100], protein: [165, 175], fat: [55, 65], carbs: [160, 180] },
};

// # DEFAULT PRESET FOODS
const DEFAULT_FOODS = [
  { name: "Paneer (100g)", cal: 265, protein: 18, fat: 21, carbs: 3 },
  { name: "Eggs (1 whole)", cal: 70, protein: 6, fat: 5, carbs: 0.5 },
  { name: "Cooked Rice (100g)", cal: 130, protein: 2.5, fat: 0.3, carbs: 28 },
  { name: "Dal (1 cup)", cal: 170, protein: 12, fat: 3, carbs: 25 },
  { name: "Wheat Bread (1 slice)", cal: 80, protein: 3, fat: 1, carbs: 14 },
  { name: "UF Shake (milk+whey)", cal: 270, protein: 37, fat: 6.5, carbs: 15 },
  { name: "Greek Yogurt (180g)", cal: 100, protein: 17, fat: 0.5, carbs: 6 },
  { name: "Banana (1 medium)", cal: 105, protein: 1, fat: 0, carbs: 27 },
  { name: "Chicken Breast (100g)", cal: 165, protein: 31, fat: 3.6, carbs: 0 },
  { name: "Chicken Keema (100g)", cal: 150, protein: 20, fat: 7, carbs: 1 },
  { name: "Chana Masala (100g)", cal: 120, protein: 5, fat: 4, carbs: 16 },
  { name: "Whey Shake (water)", cal: 130, protein: 24, fat: 1.5, carbs: 4 },
  { name: "Peanut Butter (1 tbsp)", cal: 95, protein: 4, fat: 8, carbs: 3 },
  { name: "UF Milk (240ml)", cal: 100, protein: 13, fat: 2.5, carbs: 9 },
  { name: "Lindt 85% (2 cubes)", cal: 120, protein: 2, fat: 10, carbs: 5 },
  { name: "Potstickers (6 pcs)", cal: 280, protein: 12, fat: 10, carbs: 32 },
];

function getPresetFoods() {
  if (customFoods.length > 0) return customFoods;
  return DEFAULT_FOODS.map((f, i) => ({ ...f, id: 'default-' + i }));
}

const MEAL_LABELS = ['Breakfast', 'Lunch', 'Dinner', 'Snack', 'Shake'];

// # INIT
async function init() {
  meals = await dbGetAll('meals');
  weights = await dbGetAll('weights');
  customFoods = await dbGetAll('customFoods');

  // seed defaults if empty
  if (customFoods.length === 0) {
    for (let i = 0; i < DEFAULT_FOODS.length; i++) {
      const f = { ...DEFAULT_FOODS[i], id: 'food-' + i };
      customFoods.push(f);
      await dbPut('customFoods', f);
    }
  }

  // load day type for today
  try {
    const settings = await dbGetAll('settings');
    const todaySetting = settings.find(s => s.id === 'dayType-' + viewDate);
    if (todaySetting) dayType = todaySetting.value;
  } catch(e) {}

  renderFoodSelect();
  renderMealLabels();
  updateDayToggle();
  renderAll();
}

// # DAY TYPE TOGGLE
function setDayType(type) {
  dayType = type;
  updateDayToggle();
  dbPut('settings', { id: 'dayType-' + viewDate, value: type });
  renderAll();
}

function updateDayToggle() {
  document.getElementById('dt-training').className = dayType === 'training' ? 'active' : 'inactive';
  document.getElementById('dt-rest').className = dayType === 'rest' ? 'active' : 'inactive';
}

// # DATE NAV
async function changeDate(dir) {
  const parts = viewDate.split('-');
  const d = new Date(+parts[0], +parts[1]-1, +parts[2]);
  d.setDate(d.getDate() + dir);
  const newDate = localDateStr(d);
  if (newDate > getToday()) return;
  viewDate = newDate;

  // load saved day type
  try {
    const settings = await dbGetAll('settings');
    const s = settings.find(s => s.id === 'dayType-' + viewDate);
    dayType = s ? s.value : 'training';
  } catch(e) { dayType = 'training'; }

  updateDayToggle();
  renderAll();
}

// # TABS
function switchTab(tab) {
  currentTab = tab;
  ['meals','weight','history'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('hidden', t !== tab);
  });
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  renderAll();
}

// # MODE
function setMode(mode) {
  inputMode = mode;
  document.getElementById('mode-preset').className = 'btn-mode ' + (mode === 'preset' ? 'active' : 'inactive');
  document.getElementById('mode-custom').className = 'btn-mode ' + (mode === 'custom' ? 'active' : 'inactive');
  document.getElementById('input-preset').classList.toggle('hidden', mode !== 'preset');
  document.getElementById('input-custom').classList.toggle('hidden', mode !== 'custom');
}

// # RENDERS
function renderFoodSelect() {
  const sel = document.getElementById('food-select');
  const foods = getPresetFoods();
  sel.innerHTML = foods.map((f, i) =>
    `<option value="${i}">${f.name} — ${f.cal}cal/${f.protein}p/${f.fat}f/${f.carbs}c</option>`
  ).join('');
}

function renderMealLabels() {
  document.getElementById('meal-labels').innerHTML = MEAL_LABELS.map(l =>
    `<button class="btn-toggle ${mealLabel === l ? 'active' : ''}" onclick="setMealLabel('${l}')">${l}</button>`
  ).join('');
}

function setMealLabel(l) { mealLabel = l; renderMealLabels(); }

function renderAll() {
  renderDateNav();
  renderMacroBars();
  renderMealLog();
  renderWeightTab();
  renderHistory();
}

function renderDateNav() {
  const isToday = viewDate === getToday();
  const parts = viewDate.split('-');
  const d = new Date(+parts[0], +parts[1]-1, +parts[2]);
  const label = isToday ? 'Today' : d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', weekday: 'short' });
  document.getElementById('current-date').textContent = label;
}

function getDayMeals() { return meals.filter(m => m.date === viewDate); }

function getTotals(dayMeals) {
  return dayMeals.reduce((a, m) => ({
    cal: a.cal + m.cal, protein: a.protein + m.protein, fat: a.fat + m.fat, carbs: a.carbs + m.carbs
  }), { cal: 0, protein: 0, fat: 0, carbs: 0 });
}

function renderMacroBars() {
  const t = getTotals(getDayMeals());
  const tgt = TARGETS[dayType];
  const bars = [
    { label: 'Calories', value: t.cal, min: tgt.calories[0], max: tgt.calories[1], unit: 'kcal' },
    { label: 'Protein', value: t.protein, min: tgt.protein[0], max: tgt.protein[1], unit: 'g' },
    { label: 'Fat', value: t.fat, min: tgt.fat[0], max: tgt.fat[1], unit: 'g' },
    { label: 'Carbs', value: t.carbs, min: tgt.carbs[0], max: tgt.carbs[1], unit: 'g' },
  ];
  document.getElementById('macro-bars').innerHTML = bars.map(b => {
    const pct = Math.min((b.value / b.max) * 100, 100);
    const over = b.value > b.max;
    const inRange = b.value >= b.min && b.value <= b.max;
    const color = over ? 'var(--red)' : inRange ? 'var(--green)' : 'var(--yellow)';
    return `<div class="bar-wrap">
      <div class="bar-header mono"><span>${b.label}</span><span style="color:${color}">${Math.round(b.value)}${b.unit} / ${b.min}-${b.max}${b.unit}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>`;
  }).join('');
}

function renderMealLog() {
  const dm = getDayMeals();
  const card = document.getElementById('meal-log-card');
  const log = document.getElementById('meal-log');
  if (dm.length === 0) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  log.innerHTML = dm.map(m => `
    <div class="log-item">
      <div>
        <div class="log-name">${m.name}</div>
        <div class="log-meta mono">${m.label} — ${m.cal}cal / ${m.protein}p / ${m.fat}f / ${m.carbs}c</div>
      </div>
      <button class="icon-btn" onclick="removeMeal('${m.id}')">&times;</button>
    </div>
  `).join('');
}

function renderWeightTab() {
  const sorted = [...weights].sort((a, b) => a.date.localeCompare(b.date));
  const recent = sorted.slice(-14);

  const chartCard = document.getElementById('weight-chart-card');
  if (recent.length > 1) {
    chartCard.style.display = 'block';
    const svg = document.getElementById('weight-chart');
    const maxW = Math.max(...recent.map(r => r.weight));
    const minW = Math.min(...recent.map(r => r.weight));
    const range = maxW - minW || 5;
    const w = 400;
    let html = '';
    recent.forEach((r, i) => {
      const x = (i / (recent.length - 1)) * (w - 60) + 30;
      const y = 100 - ((r.weight - minW + 1) / (range + 2)) * 80;
      if (i < recent.length - 1) {
        const nx = ((i+1) / (recent.length - 1)) * (w - 60) + 30;
        const ny = 100 - ((recent[i+1].weight - minW + 1) / (range + 2)) * 80;
        html += `<line x1="${x}" y1="${y}" x2="${nx}" y2="${ny}" stroke="var(--accent)" stroke-width="2" opacity="0.6"/>`;
      }
      html += `<circle cx="${x}" cy="${y}" r="4" fill="var(--accent)"/>`;
      html += `<text x="${x}" y="${y-10}" text-anchor="middle" font-size="9" fill="var(--text-secondary)" font-family="'DM Mono',monospace">${r.weight}</text>`;
      html += `<text x="${x}" y="115" text-anchor="middle" font-size="7" fill="var(--text-muted)" font-family="'DM Mono',monospace">${r.date.slice(5)}</text>`;
    });
    svg.innerHTML = html;
  } else {
    chartCard.style.display = 'none';
  }

  const listCard = document.getElementById('weight-list-card');
  const list = document.getElementById('weight-list');
  if (sorted.length > 0) {
    listCard.style.display = 'block';
    list.innerHTML = sorted.slice(-7).reverse().map(w =>
      `<div class="log-item"><span class="mono" style="color:var(--text-secondary)">${w.date}</span><span class="mono" style="font-weight:600">${w.weight} kg</span></div>`
    ).join('');
  } else {
    listCard.style.display = 'none';
  }
}

function renderHistory() {
  const dates = [...new Set(meals.map(m => m.date))].sort().reverse().slice(0, 21);
  const el = document.getElementById('history-list');
  if (dates.length === 0) { el.innerHTML = '<div class="empty mono">No history yet</div>'; return; }
  el.innerHTML = dates.map(date => {
    const dm = meals.filter(m => m.date === date);
    const t = getTotals(dm);
    const isToday = date === getToday();
    // use training targets as baseline for history color
    const calOk = t.cal >= 2000 && t.cal <= 2400;
    return `<div class="card" style="padding:14px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span class="mono" style="font-size:13px;font-weight:600">${isToday ? 'Today' : date}</span>
        <span class="mono" style="font-size:12px;color:${calOk ? 'var(--green)' : 'var(--yellow)'}">${Math.round(t.cal)} kcal</span>
      </div>
      <div class="mono" style="font-size:11px;color:var(--text-muted)">P: ${Math.round(t.protein)}g · F: ${Math.round(t.fat)}g · C: ${Math.round(t.carbs)}g</div>
    </div>`;
  }).join('');
}

// # ACTIONS
async function addMeal() {
  let entry;
  if (inputMode === 'preset') {
    const idx = +document.getElementById('food-select').value;
    const qty = +document.getElementById('food-qty').value || 1;
    const foods = getPresetFoods();
    const p = foods[idx];
    entry = {
      id: Date.now().toString(),
      date: viewDate,
      label: mealLabel,
      name: p.name + (qty !== 1 ? ' x' + qty : ''),
      cal: Math.round(p.cal * qty),
      protein: Math.round(p.protein * qty * 10) / 10,
      fat: Math.round(p.fat * qty * 10) / 10,
      carbs: Math.round(p.carbs * qty * 10) / 10,
    };
    document.getElementById('food-qty').value = 1;
  } else {
    const name = document.getElementById('c-name').value.trim();
    const cal = document.getElementById('c-cal').value;
    if (!name || !cal) return;
    entry = {
      id: Date.now().toString(),
      date: viewDate,
      label: mealLabel,
      name,
      cal: +cal,
      protein: +(document.getElementById('c-protein').value) || 0,
      fat: +(document.getElementById('c-fat').value) || 0,
      carbs: +(document.getElementById('c-carbs').value) || 0,
    };
    ['c-name','c-cal','c-protein','c-fat','c-carbs'].forEach(id => document.getElementById(id).value = '');
  }
  meals.push(entry);
  await dbPut('meals', entry);
  renderAll();
}

async function removeMeal(id) {
  meals = meals.filter(m => m.id !== id);
  await dbDelete('meals', id);
  renderAll();
}

async function addWeight() {
  const val = +document.getElementById('bw-input').value;
  if (!val) return;
  const today = getToday();
  weights = weights.filter(w => w.date !== today);
  const entry = { id: 'w-' + today, date: today, weight: val };
  weights.push(entry);
  await dbPut('weights', entry);
  document.getElementById('bw-input').value = '';
  renderAll();
}

// # FOOD MANAGER (edit presets)
function openFoodManager() {
  const root = document.getElementById('modal-root');
  const foods = getPresetFoods();
  root.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeFoodManager()">
      <div class="modal" style="max-height:80vh;overflow-y:auto">
        <h3>Edit My Foods</h3>
        <div id="food-manager-list">
          ${foods.map((f, i) => `
            <div class="food-list-item">
              <div>
                <div style="font-weight:500">${f.name}</div>
                <div class="mono" style="font-size:10px;color:var(--text-muted)">${f.cal}cal / ${f.protein}p / ${f.fat}f / ${f.carbs}c</div>
              </div>
              <div class="flex gap-8">
                <button class="icon-btn" onclick="editFood(${i})" title="Edit">✎</button>
                <button class="icon-btn" onclick="deleteFood(${i})" title="Delete" style="color:var(--red)">&times;</button>
              </div>
            </div>
          `).join('')}
        </div>
        <div class="btn-row" style="margin-top:14px">
          <button class="btn btn-primary" onclick="openAddFood()">+ Add New</button>
          <button class="btn btn-secondary" onclick="closeFoodManager()">Close</button>
        </div>
      </div>
    </div>
  `;
}

function closeFoodManager() {
  document.getElementById('modal-root').innerHTML = '';
  renderFoodSelect();
}

function openAddFood() {
  document.getElementById('modal-root').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeFoodManager()">
      <div class="modal">
        <h3>Add Food</h3>
        <input id="ef-name" placeholder="Food name" class="mb-8">
        <div class="grid-2 mb-8">
          <input id="ef-cal" type="number" placeholder="Calories">
          <input id="ef-protein" type="number" placeholder="Protein (g)">
          <input id="ef-fat" type="number" placeholder="Fat (g)">
          <input id="ef-carbs" type="number" placeholder="Carbs (g)">
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="saveNewFood()">Save</button>
          <button class="btn btn-secondary" onclick="openFoodManager()">Back</button>
        </div>
      </div>
    </div>
  `;
}

async function saveNewFood() {
  const name = document.getElementById('ef-name').value.trim();
  const cal = +document.getElementById('ef-cal').value;
  if (!name || !cal) return;
  const food = {
    id: 'food-' + Date.now(),
    name,
    cal,
    protein: +document.getElementById('ef-protein').value || 0,
    fat: +document.getElementById('ef-fat').value || 0,
    carbs: +document.getElementById('ef-carbs').value || 0,
  };
  customFoods.push(food);
  await dbPut('customFoods', food);
  openFoodManager();
}

function editFood(idx) {
  const foods = getPresetFoods();
  const f = foods[idx];
  document.getElementById('modal-root').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeFoodManager()">
      <div class="modal">
        <h3>Edit Food</h3>
        <input id="ef-name" value="${f.name}" class="mb-8">
        <div class="grid-2 mb-8">
          <input id="ef-cal" type="number" value="${f.cal}" placeholder="Calories">
          <input id="ef-protein" type="number" value="${f.protein}" placeholder="Protein (g)">
          <input id="ef-fat" type="number" value="${f.fat}" placeholder="Fat (g)">
          <input id="ef-carbs" type="number" value="${f.carbs}" placeholder="Carbs (g)">
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="saveEditFood('${f.id}')">Save</button>
          <button class="btn btn-secondary" onclick="openFoodManager()">Back</button>
        </div>
      </div>
    </div>
  `;
}

async function saveEditFood(id) {
  const name = document.getElementById('ef-name').value.trim();
  const cal = +document.getElementById('ef-cal').value;
  if (!name || !cal) return;
  const updated = {
    id,
    name,
    cal,
    protein: +document.getElementById('ef-protein').value || 0,
    fat: +document.getElementById('ef-fat').value || 0,
    carbs: +document.getElementById('ef-carbs').value || 0,
  };
  const idx = customFoods.findIndex(f => f.id === id);
  if (idx >= 0) customFoods[idx] = updated;
  await dbPut('customFoods', updated);
  openFoodManager();
}

async function deleteFood(idx) {
  const foods = getPresetFoods();
  const f = foods[idx];
  customFoods = customFoods.filter(cf => cf.id !== f.id);
  await dbDelete('customFoods', f.id);
  openFoodManager();
}

// # SERVICE WORKER
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

init();
</script>
